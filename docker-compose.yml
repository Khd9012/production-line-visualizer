services:
  core:
    build:
      context: ./apps/production-virtualizer-core
    container_name: production-virtualizer-core
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SCADA_DB_URL: jdbc:h2:file:/app/data/scada;MODE=LEGACY;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    ports:
      - "8902:8902"
    volumes:
      - ./apps/production-virtualizer-core/data:/app/data

  ui:
    build:
      context: ./apps/production-virtualizer-ui
    container_name: production-virtualizer-ui
    depends_on:
      - core
    ports:
      - "8080:80"
